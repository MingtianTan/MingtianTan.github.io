<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mingtian Tan</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #fafafa;
      color: #222;
      padding: 24px;
    }
    .card {
      text-align: center;
      max-width: 420px;
    }
    .avatar {
      width: 128px;
      height: 128px;
      border-radius: 50%;
      border: 3px solid #fff;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
      margin-bottom: 20px;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 1.05rem;
      color: #666;
      margin-bottom: 6px;
    }
    .status {
      display: inline-block;
      margin-top: 18px;
      padding: 8px 16px;
      border-radius: 999px;
      background: #eef6ff;
      color: #0366d6;
      font-size: 0.95rem;
      font-weight: 500;
    }
    .links {
      margin-top: 24px;
      font-size: 0.95rem;
    }
    .links a {
      color: #0366d6;
      text-decoration: none;
    }
    .links a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="card">
    <img
      class="avatar"
      src="https://github.com/MingtianTan.png"
      alt="Mingtian Tan"
    />
    <h1>Mingtian Tan</h1>
    <p class="subtitle">University of Michigan, Ann Arbor</p>
    <p class="status">Coming Soon — personal website under construction</p>
    <p class="links">
      <a href="https://github.com/MingtianTan">GitHub Profile</a>
    </p>
  </div>
</body>
</html>
